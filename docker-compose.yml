version: '3.8'

services:
  # Base de datos local exclusiva para las pruebas de usuarios
  user-mysql:
    image: mysql:8.0
    container_name: user_mysql_db
    restart: always
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    volumes:
      - user_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Microservicio de Usuarios en Node.js
  user-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eval3_user_backend
    restart: always
    ports:
      - "8081:8081"
    environment:
      - PORT=8081
      - DB_HOST=user-mysql
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_NAME=${DB_NAME}
      - DB_PASSWORD=${DB_PASSWORD}
    depends_on:
      user-mysql:
        condition: service_healthy

volumes:
  user_db_data: